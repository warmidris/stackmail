version: '3.9'

services:
  stackmail:
    build: .
    ports:
      - "8800:8800"
    volumes:
      - stackmail_data:/data
    environment:
      STACKMAIL_HOST: "0.0.0.0"
      STACKMAIL_PORT: "8800"
      STACKMAIL_DB_FILE: "/data/stackmail.db"
      STACKMAIL_SERVER_STX_ADDRESS: "${STACKMAIL_SERVER_STX_ADDRESS}"
      STACKMAIL_SERVER_PRIVATE_KEY: "${STACKMAIL_SERVER_PRIVATE_KEY}"
      STACKMAIL_SF_CONTRACT_ID: "${STACKMAIL_SF_CONTRACT_ID}"
      STACKMAIL_STACKS_NETWORK: "${STACKMAIL_STACKS_NETWORK:-mainnet}"
      STACKMAIL_MESSAGE_PRICE_SATS: "${STACKMAIL_MESSAGE_PRICE_SATS:-1000}"
      STACKMAIL_MIN_FEE_SATS: "${STACKMAIL_MIN_FEE_SATS:-100}"
      STACKMAIL_MAX_PENDING_PER_SENDER: "${STACKMAIL_MAX_PENDING_PER_SENDER:-5}"
    restart: unless-stopped

volumes:
  stackmail_data:

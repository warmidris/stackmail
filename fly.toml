app = "mailslot"
primary_region = "ord"

[build]

[env]
  MAILSLOT_HOST = "0.0.0.0"
  MAILSLOT_PORT = "8800"
  MAILSLOT_DB_FILE = "/data/mailslot.db"
  MAILSLOT_STACKS_NETWORK = "mainnet"
  MAILSLOT_AUTH_AUDIENCE = "https://mailslot.locker"
  MAILSLOT_ALLOWED_ORIGINS = "https://mailslot.locker"
  MAILSLOT_MESSAGE_PRICE_SATS = "100"
  MAILSLOT_MIN_FEE_SATS = "10"
  MAILSLOT_MAX_PENDING_PER_SENDER = "10"
  MAILSLOT_MAX_PENDING_PER_RECIPIENT = "20"
  MAILSLOT_MAX_DEFERRED_PER_SENDER = "10"
  MAILSLOT_MAX_DEFERRED_PER_RECIPIENT = "20"
  MAILSLOT_MAX_DEFERRED_GLOBAL = "200"
  MAILSLOT_DEFERRED_MESSAGE_TTL_MS = "86400000"
  MAILSLOT_MAX_BORROW_PER_TAP = "5000"
  MAILSLOT_RECEIVE_CAPACITY_MULTIPLIER = "20"
  MAILSLOT_REFRESH_CAPACITY_COOLDOWN_MS = "86400000"

[[mounts]]
  source = "mailslot_data"
  destination = "/data"

[http_service]
  internal_port = 8800
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "5s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
